name: Build and Release APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4  # 升级到 v4
      with:
        lfs: true  # 启用 LFS
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4  # 升级到 v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3  # 升级到 v3
      
    - name: Cache Gradle packages
      uses: actions/cache@v4  # 升级到 v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
    
    - name: Make gradlew executable
      run: chmod +x ./gradlew
    
    - name: Build with Gradle
      env:
        ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}  # 不需要 export，直接用 env
      run: ./gradlew assembleDebug --stacktrace
      
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: ScreenQRScanner-APK
        path: app/build/outputs/apk/debug/*.apk
        if-no-files-found: warn
